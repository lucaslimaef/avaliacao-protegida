<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
         background:linear-gradient(135deg,#2c3e50 0%,#34495e 100%); min-height:100vh;
         display:flex; align-items:center; justify-content:center; padding:20px; }
  .box { background:#fff; border-radius:14px; padding:40px 32px; max-width:380px; width:100%;
         box-shadow:0 12px 40px rgba(0,0,0,.3); text-align:center; }
  .lock { font-size:42px; margin-bottom:14px; }

  input { width:100%; padding:14px 16px; font-size:16px; border:2px solid #dfe4ea;
          border-radius:8px; outline:none; transition:border .2s; margin-bottom:14px; }
  input:focus { border-color:#e74c3c; }
  button { width:100%; padding:14px; font-size:16px; font-weight:600; color:#fff;
           background:#e74c3c; border:none; border-radius:8px; cursor:pointer; transition:background .2s; }
  button:hover { background:#c0392b; }
  button:disabled { background:#bdc3c7; cursor:default; }
  .erro { color:#e74c3c; font-size:13px; margin-top:14px; min-height:18px; }
</style>
</head>

const SALT = "pKJjgddWeZgBhN/Y5isYUA==";
const IV = "Kano7Od4Fl06K+a2";
const ITER = 250000;

function b64ToBytes(b64){ return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }

async function abrir(senha){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(senha), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64ToBytes(SALT), iterations:ITER, hash:'SHA-256' },
    baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const plano = await crypto.subtle.decrypt(
    { name:'AES-GCM', iv:b64ToBytes(IV) }, key, b64ToBytes(PAYLOAD)
  );
  return new TextDecoder().decode(plano);
}

const form = document.getElementById('f');
const erroEl = document.getElementById('erro');
const btn = document.getElementById('btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  erroEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Abrindo...';
  try {
    const html = await abrir(document.getElementById('senha').value);
    document.open(); document.write(html); document.close();
  } catch (err) {
    erroEl.textContent = 'Senha incorreta. Tente de novo.';
    btn.disabled = false;
    btn.textContent = 'Abrir laudo';
  }
});
</script>
